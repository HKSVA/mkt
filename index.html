<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVA · Marketing Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Syne:wght@600;700;800&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--surface:#141414;--border:#1e1e1e;--border2:#2a2a2a;
  --text:#e8e8e8;--muted:#555;--muted2:#777;
  --lime:#c8e63c;--lime-dim:rgba(200,230,60,.08);--lime-b:rgba(200,230,60,.2);
  --red:#e63c3c;
}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono',monospace;min-height:100vh;overflow-x:hidden;}

/* ── Login ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s ease;}
#login.hide{opacity:0;pointer-events:none;}
.login-box{width:320px;border:1px solid var(--border2);padding:40px 32px;}
.login-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:.04em;margin-bottom:4px;}
.login-logo span{color:var(--lime);}
.login-sub{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:32px;}
.login-label{font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.login-input{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'Geist Mono',monospace;font-size:14px;padding:10px 12px;outline:none;letter-spacing:.1em;transition:border-color .2s;}
.login-input:focus{border-color:var(--lime);}
.login-btn{width:100%;margin-top:16px;background:var(--lime);color:#000;font-family:'Geist Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;padding:12px;border:none;cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.85;}
.login-err{font-size:9px;color:var(--red);letter-spacing:.12em;margin-top:10px;height:14px;transition:opacity .2s;}

/* ── App ── */
#app{display:none;min-height:100vh;}
#app.show{display:block;}

/* ── Topbar ── */
.topbar{border-bottom:1px solid var(--border);padding:0 32px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;}
.logo span{color:var(--lime);}
.topbar-right{font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:20px;}
.topbar-right a{color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s;}
.topbar-right a:hover{color:var(--lime);}

/* ── Layout ── */
.main{max-width:1100px;margin:0 auto;padding:40px 32px;}

/* ── Section header ── */
.sec-hdr{display:flex;align-items:baseline;gap:16px;margin-bottom:24px;}
.sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:.02em;}
.sec-count{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}

/* ── Post grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);}
.post-card{background:var(--bg);padding:24px;cursor:pointer;transition:background .15s;position:relative;}
.post-card:hover{background:var(--surface);}
.post-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.post-date{font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;}
.post-type{font-size:8px;letter-spacing:.15em;color:var(--muted2);text-transform:uppercase;border:1px solid var(--border2);padding:3px 8px;}
.post-type.reel{color:var(--lime);border-color:var(--lime-b);}
.post-type.carousel{color:#88aadd;border-color:rgba(68,119,187,.3);}
.post-type.image{color:#c8904a;border-color:rgba(160,100,40,.3);}
.post-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:8px;letter-spacing:.01em;}
.post-preview{font-size:11px;color:var(--muted2);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.post-footer{display:flex;align-items:center;gap:8px;margin-top:16px;}
.post-tag{font-size:8px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;background:var(--border);padding:3px 8px;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg);border:1px solid var(--border2);width:100%;max-width:680px;position:relative;}
.modal-topbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-family:'Geist Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:.12em;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:24px;}
.modal-type{font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;line-height:1.2;}
.modal-date{font-size:9px;color:var(--muted);letter-spacing:.15em;margin-bottom:24px;}
.modal-section{margin-bottom:20px;}
.modal-section-label{font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.modal-section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* Caption box */
.caption-box{background:var(--surface);border:1px solid var(--border2);padding:16px;font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto;font-family:'Geist Mono',monospace;}
.caption-box .hashtag{color:var(--lime);}
.copy-btn{width:100%;margin-top:10px;background:transparent;border:1px solid var(--border2);color:var(--muted2);font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.copy-btn:hover{border-color:var(--lime);color:var(--lime);}
.copy-btn.copied{border-color:var(--lime);color:var(--lime);}

/* Asset buttons */
.asset-row{display:flex;gap:8px;flex-wrap:wrap;}
.asset-btn{flex:1;min-width:140px;padding:12px 16px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:center;gap:8px;}
.asset-btn:hover{border-color:var(--lime-b);background:var(--lime-dim);}
.asset-btn.primary{background:var(--lime);color:#000;border-color:var(--lime);}
.asset-btn.primary:hover{opacity:.85;}

/* Divider */
.divider{height:1px;background:var(--border);margin:40px 0;}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:11px;letter-spacing:.12em;}

/* ── Add panel (admin only) ── */
.add-panel{border:1px solid var(--border2);padding:24px;margin-bottom:32px;display:none;}
.add-panel.show{display:block;}
.add-panel-hdr{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'Geist Mono',monospace;font-size:12px;padding:9px 12px;outline:none;transition:border-color .2s;resize:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--lime);}
.form-select option{background:#111;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-submit{background:var(--lime);color:#000;font-family:'Geist Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;padding:11px 24px;border:none;cursor:pointer;transition:opacity .15s;}
.form-submit:hover{opacity:.85;}

@media(max-width:600px){
  .main{padding:24px 16px;}
  .topbar{padding:0 16px;}
  .form-row-2{grid-template-columns:1fr;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">SVA <span>MKT</span></div>
    <div class="login-sub">Marketing Hub</div>
    <div class="login-label">Access Code</div>
    <input class="login-input" id="pwInput" type="password" placeholder="········" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="logo">SVA <span>MKT</span></div>
    <div class="topbar-right">
      <span id="postCount">0 posts</span>
      <a onclick="toggleAddPanel()" id="addToggle" style="display:none">+ Add Post</a>
      <a onclick="doLogout()">Logout</a>
    </div>
  </div>

  <div class="main">

    <!-- Add panel -->
    <div class="add-panel" id="addPanel">
      <div class="add-panel-hdr">New Post</div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Job # (auto)</label>
          <input class="form-input" id="f-jobnum" placeholder="1" type="number" min="1">
        </div>
        <div class="form-row">
          <label class="form-label">Title</label>
          <input class="form-input" id="f-title" placeholder="Summer 2026 Reel">
        </div>
        <div class="form-row">
          <label class="form-label">Type</label>
          <select class="form-select" id="f-type">
            <option value="reel">Reel</option>
            <option value="carousel">Carousel</option>
            <option value="image">Image</option>
          </select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Date</label>
          <input class="form-input" id="f-date" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">Asset URL (optional)</label>
          <input class="form-input" id="f-url" placeholder="https://...">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Caption (paste full caption + hashtags)</label>
        <textarea class="form-textarea" id="f-caption" rows="8" placeholder="🎤 暑期唱歌計劃...&#10;&#10;#SVA暑期課程 #HongKong..."></textarea>
      </div>
      <button class="form-submit" onclick="addPost()">Save Post</button>
    </div>

    <!-- Posts -->
    <div class="sec-hdr">
      <div class="sec-title">Content Library</div>
      <div class="sec-count" id="libCount">—</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyState" style="display:none">No posts yet. Add your first post above.</div>

  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-topbar">
      <div style="font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase">SVA Marketing Hub</div>
      <button class="modal-close" onclick="closeModalDirect()">✕ Close</button>
    </div>
    <div class="modal-body">
      <div class="modal-type" id="m-type"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-date" id="m-date"></div>

      <div class="modal-section">
        <div class="modal-section-label">Caption</div>
        <div class="caption-box" id="m-caption"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyCaption()">
          <span>⎘</span> Copy Caption
        </button>
      </div>

      <div class="modal-section" id="m-asset-section">
        <div class="modal-section-label">Assets</div>
        <div class="asset-row" id="m-assets"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──
const PW = 'ggao';
const ADMIN_PW = 'ggao';

// ── Auth ──
function doLogin(){
  const v = document.getElementById('pwInput').value.trim();
  const err = document.getElementById('loginErr');
  if(v === PW){
    sessionStorage.setItem('mkt_auth','1');
    if(v === ADMIN_PW) sessionStorage.setItem('mkt_admin','1');
    document.getElementById('login').classList.add('hide');
    document.getElementById('app').classList.add('show');
    initApp();
  } else {
    err.textContent = 'Incorrect access code.';
    setTimeout(()=>err.textContent='', 2000);
  }
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function doLogout(){
  sessionStorage.clear();
  location.reload();
}

// ── Storage ──
function getPosts(){
  try{ return JSON.parse(localStorage.getItem('sva_mkt_posts')||'[]'); }
  catch(e){ return []; }
}
function savePosts(p){ localStorage.setItem('sva_mkt_posts', JSON.stringify(p)); }

// ── Init ──
function initApp(){
  if(!sessionStorage.getItem('mkt_auth')){ return; }
  const isAdmin = sessionStorage.getItem('mkt_admin');
  if(isAdmin){
    document.getElementById('addToggle').style.display='';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }
  // Force reload defaults if fewer than 2 posts (catches stale localStorage)
  const existing = getPosts();
  if(existing.length < 2){
    localStorage.removeItem('sva_mkt_posts');
    loadDefaultPosts();
    return;
  }
  renderPosts();
}

function loadDefaultPosts(){
  const caption1 = `🎤 暑期唱歌計劃正式開始！

7天 · 7課 · 每晚 7:30pm
由 Sound Healing 到 Music Theatre，今個暑假盡情探索你的聲音

📍 Hong Kong & Online
👥 5–8人小班 · 即學即用

━━━━━━━━━━━━━━━━━━━━━
🗓️ 課程一覽

MON｜Sound Healing with Humming 吟唱療癒 （ONLINE）
TUE｜Vocal Building 練聲小組
WED｜Live Stage Singer 歌手實戰小組
THU｜Cantopop Battle 廣東歌表演培訓
FRI｜Therapeutic Sound 自我聲音探索 （HYBRID）
SAT｜Songwriting with J.Arie 作曲課小組
SUN｜Voices Meet Theatre 音樂×劇場訓練班

━━━━━━━━━━━━━━━━━━━━━
⏰ 早鳥優惠 10% OFF
截止：6月15日 23:59

💬 留言「SUMMER」即 send 詳情及報名連結
🔗 hksva.com

━━━━━━━━━━━━━━━━━━━━━
#SVA暑期課程 #HongKongSinging #唱歌班 #暑期活動 #聲音療癒 #廣東歌 #音樂劇 #作曲 #小班教學 #SummerProgram #VocalCoaching #SchoolOfVocalArtistry #hksva #systemicvocaladvancement`;

  const caption2 = `你又係點唱高音嘅呢？留言話我哋知～`;

  const posts = [
    {
      id: 1000001,
      jobNum: 1,
      title: 'Summer 2026 — Singing Program Launch',
      type: 'reel',
      date: '2026-06-08',
      caption: caption1,
      assetUrl: 'https://hksva.github.io/mkt/SVA_Reel_001_Summer2026.html'
    },
    {
      id: 1000002,
      jobNum: 2,
      title: 'Vocal Building - High Note Reel',
      type: 'reel',
      date: '2026-06-10',
      caption: caption2,
      assetUrl: 'https://hksva.github.io/mkt/SVA_Reel_002_Tips.html'
    }
  ];
  savePosts(posts);
  renderPosts();
}

// ── Render ──
function renderPosts(){
  const posts = getPosts().sort((a,b)=>b.date.localeCompare(a.date));
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('libCount');
  const topCount = document.getElementById('postCount');

  count.textContent = posts.length + ' post' + (posts.length!==1?'s':'');
  topCount.textContent = posts.length + ' posts';

  if(!posts.length){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  grid.innerHTML = posts.map(p=>{
    const preview = p.caption.replace(/[#\n]/g,' ').trim().substring(0,80)+'...';
    const jobNum = p.jobNum ? `<span style="font-size:9px;letter-spacing:.15em;color:var(--lime);margin-right:8px">#${p.jobNum}</span>` : '';
    return `<div class="post-card" onclick="openPost(${p.id})">
      <div class="post-meta">
        <div class="post-date">${fmtDate(p.date)}</div>
        <div class="post-type ${p.type}">${p.type.toUpperCase()}</div>
      </div>
      <div class="post-title">${jobNum}${p.title}</div>
      <div class="post-preview">${preview}</div>
    </div>`;
  }).join('');
}

function fmtDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

// ── Modal ──
let currentCaption = '';

function openPost(id){
  const posts = getPosts();
  const p = posts.find(x=>x.id===id);
  if(!p) return;

  document.getElementById('m-type').textContent = p.type.toUpperCase();
  document.getElementById('m-title').textContent = (p.jobNum ? '#'+p.jobNum+' ' : '') + p.title;
  document.getElementById('m-date').textContent = fmtDate(p.date);

  const captionHtml = p.caption
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#\S+)/g,'<span class="hashtag">$1</span>');
  document.getElementById('m-caption').innerHTML = captionHtml;
  currentCaption = p.caption;

  const assetSection = document.getElementById('m-asset-section');
  const assetRow = document.getElementById('m-assets');
  if(p.assetUrl || p.type === 'reel'){
    assetSection.style.display='';
    let btns = '';
    if(p.assetUrl){
      btns += `<a class="asset-btn primary" href="${p.assetUrl}" target="_blank">⬇ Download Asset</a>`;
    }
    if(p.type === 'reel'){
      btns += `<button class="asset-btn" onclick="alert('Upload the HTML reel file to launch the reel recorder.')">▶ Open Reel</button>`;
    }
    assetRow.innerHTML = btns;
  } else {
    assetSection.style.display='none';
  }

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.classList.remove('copied');
  copyBtn.innerHTML = '<span>⎘</span> Copy Caption';

  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e){
  if(e.target === document.getElementById('modalBg')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modalBg').classList.remove('open');
}

function copyCaption(){
  navigator.clipboard.writeText(currentCaption).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '<span>✓</span> Copied!';
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML = '<span>⎘</span> Copy Caption';
    }, 2000);
  });
}

// ── Add Post ──
function toggleAddPanel(){
  const p = document.getElementById('addPanel');
  p.classList.toggle('show');
  document.getElementById('addToggle').textContent = p.classList.contains('show') ? '✕ Cancel' : '+ Add Post';
  if(p.classList.contains('show')){
    const posts = getPosts();
    const maxJob = posts.reduce((m,x)=>Math.max(m, x.jobNum||0), 0);
    document.getElementById('f-jobnum').value = maxJob + 1;
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }
}

function addPost(){
  const title = document.getElementById('f-title').value.trim();
  const type  = document.getElementById('f-type').value;
  const date  = document.getElementById('f-date').value;
  const url   = document.getElementById('f-url').value.trim();
  const cap   = document.getElementById('f-caption').value.trim();

  if(!title || !cap){ alert('Title and caption are required.'); return; }

  const jobNum = parseInt(document.getElementById('f-jobnum').value) || (getPosts().reduce((m,x)=>Math.max(m,x.jobNum||0),0)+1);
  const posts = getPosts();
  posts.push({ id: Date.now(), jobNum, title, type, date, caption: cap, assetUrl: url });
  savePosts(posts);
  renderPosts();

  document.getElementById('f-title').value='';
  document.getElementById('f-caption').value='';
  document.getElementById('f-url').value='';
  toggleAddPanel();
}

// ── Auto-login if session exists ──
if(sessionStorage.getItem('mkt_auth')){
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.add('show');
  initApp();
}
</script>
</body>
</html>
